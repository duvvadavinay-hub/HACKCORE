<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <style>/* ===== Body Background ===== */
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2193b0, #6dd5ed);
    text-align: center;
    color: #ffffff;
}

/* ===== Main Heading ===== */
h1 {
    margin-top: 40px;
    font-size: 38px;
    letter-spacing: 3px;
}

/* ===== Section Headings ===== */
h4 {
    margin-top: 25px;
    font-weight: bold;
}

/* ===== Dropdown Styling ===== */
select {
    width: 250px;
    padding: 8px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* ===== Input Styling ===== */
input {
    width: 200px;
    padding: 8px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* ===== Textarea Styling ===== */
textarea {
    width: 60%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    resize: none;
    outline: none;
}

/* ===== Labels ===== */
label {
    display: block;
    margin-top: 20px;
    font-weight: bold;
}

/* ===== Buttons ===== */
button {
    margin-top: 15px;
    padding: 8px 20px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(to right, #ff512f, #dd2476);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* ===== Hover Effect ===== */
button:hover {
    transform: scale(1.08);
    background: linear-gradient(to right, #00c6ff, #0072ff);
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
    textarea {
        width: 90%;
    }

    select,
    input {
        width: 90%;
    }
}</style>
</head>
