<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>/* ===== Body Background ===== */
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* ===== Heading ===== */
h1 {
    margin-top: 40px;
    font-size: 36px;
    letter-spacing: 3px;
}

/* ===== Sub Text ===== */
p {
    font-weight: bold;
    margin-top: 20px;
}

/* ===== Dropdown & Input Fields ===== */
select,
input,
textarea {
    width: 250px;
    padding: 8px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* ===== Section Label Styling ===== */
label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
}

/* ===== Complaint Box ===== */
ol {
    width: 70%;
    margin: 40px auto;
    background: rgba(255, 255, 255, 0.15);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: left;
}

/* ===== Textarea ===== */
textarea {
    width: 100%;
    resize: none;
    margin-top: 10px;
}

/* ===== Buttons ===== */
button {
    padding: 8px 18px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(to right, #ff512f, #dd2476);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

/* ===== Button Hover ===== */
button:hover {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    transform: scale(1.08);
}

/* ===== Responsive Design ===== */
@media (max-width: 768px) {
    ol {
        width: 90%;
    }

    select,
    input {
        width: 90%;
    }
}</style>
</head>
<body>

</body>
</html>
